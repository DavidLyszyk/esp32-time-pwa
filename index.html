<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ESP32 BLE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Bebas+Neue&family=Barlow+Condensed:wght@700&display=swap');
  :root {
    --bg: #060608;
    --surface: #0f1117;
    --border: rgba(255,255,255,0.06);
    --accent: #c8ff00;
    --accent-dim: rgba(200,255,0,0.12);
    --red: #ff3b30;
    --text: #f0f0f0;
    --muted: rgba(255,255,255,0.35);
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; overflow: hidden; }
  body {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: calc(var(--safe-top) + 2rem) 2rem calc(var(--safe-bottom) + 2rem);
    min-height: 100dvh; position: relative;
  }
  .orb { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0; }
  .orb1 { width: 300px; height: 300px; background: radial-gradient(circle, rgba(200,255,0,0.08), transparent 70%); top: -60px; right: -60px; }
  .orb2 { width: 250px; height: 250px; background: radial-gradient(circle, rgba(0,160,255,0.06), transparent 70%); bottom: 0; left: -80px; }
  .wrapper { position: relative; z-index: 1; width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 1.5rem; }
  .header { text-align: center; animation: fadeUp 0.6s ease both; }
  .title { font-family: 'Bebas Neue', sans-serif; font-size: 3.5rem; letter-spacing: 0.05em; line-height: 1; color: var(--text); text-transform: none;}
  .title span { color: var(--accent); }
  .tagline { font-size: 0.65rem; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; margin-top: 0.4rem; }
  .status-pill { display: flex; align-items: center; justify-content: center; gap: 0.5rem; font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); animation: fadeUp 0.6s 0.1s ease both; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); transition: all 0.4s ease; flex-shrink: 0; }
  .status-dot.connected { background: var(--accent); box-shadow: 0 0 8px var(--accent), 0 0 20px rgba(200,255,0,0.4); animation: breathe 2.5s ease-in-out infinite; }
  .status-dot.error { background: var(--red); box-shadow: 0 0 8px var(--red); }
  @keyframes breathe { 0%,100%{opacity:1;box-shadow:0 0 8px var(--accent),0 0 20px rgba(200,255,0,0.4)} 50%{opacity:0.7;box-shadow:0 0 4px var(--accent),0 0 10px rgba(200,255,0,0.2)} }
  .time-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 1.75rem 1.5rem; position: relative; overflow: hidden; animation: fadeUp 0.6s 0.2s ease both; transition: border-color 0.4s ease; }
  .time-card.has-data { border-color: rgba(200,255,0,0.2); }
  .time-card::before { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(200,255,0,0.03) 0%,transparent 60%); pointer-events:none; }
  .card-label { font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 1rem; }
  .time-display { font-family: 'Bebas Neue', sans-serif; font-size: 2.2rem; letter-spacing: 0.05em; color: var(--accent); min-height: 2.5rem; transition: all 0.3s ease; word-break: break-all; }
  .time-display.empty { color: rgba(255,255,255,0.1); font-size: 1.4rem; letter-spacing: 0.15em; }
  .time-sub { font-size: 0.6rem; color: var(--muted); margin-top: 0.6rem; letter-spacing: 0.1em; min-height: 0.8rem; }
  .scan-line { position:absolute; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,rgba(200,255,0,0.4),transparent); top:0; opacity:0; transition:opacity 0.3s; }
  .time-card.has-data .scan-line { opacity:1; animation:scanDown 2s ease-in-out infinite; }
  @keyframes scanDown { 0%{top:0;opacity:0} 10%{opacity:1} 90%{opacity:1} 100%{top:100%;opacity:0} }
  .btn-connect { width:100%; padding:1.1rem; border-radius:16px; border:none; font-family:'DM Mono',monospace; font-size:0.8rem; font-weight:500; letter-spacing:0.15em; text-transform:uppercase; cursor:pointer; transition:all 0.25s ease; position:relative; overflow:hidden; animation:fadeUp 0.6s 0.3s ease both; }
  .btn-connect.idle { background:var(--accent); color:#0a0a0a; }
  .btn-connect.idle:active { transform:scale(0.97); background:#aade00; }
  .btn-connect.connected { background:transparent; border:1px solid rgba(255,59,48,0.4); color:var(--red); }
  .btn-connect.connected:active { transform:scale(0.97); background:rgba(255,59,48,0.08); }
  .btn-connect.connecting { background:var(--accent-dim); border:1px solid rgba(200,255,0,0.3); color:var(--accent); pointer-events:none; }
  .btn-send { width:100%; padding:1.1rem; border-radius:16px; border:1px solid var(--border); background:var(--surface); color:var(--text); font-family:'DM Mono',monospace; font-size:0.8rem; font-weight:500; letter-spacing:0.15em; text-transform:uppercase; cursor:pointer; transition:all 0.25s ease; animation:fadeUp 0.6s 0.4s ease both; display:flex; align-items:center; justify-content:center; gap:0.6rem; }
  .btn-send:not(:disabled):active { transform:scale(0.97); border-color:rgba(200,255,0,0.3); background:var(--accent-dim); color:var(--accent); }
  .btn-send:disabled { opacity:0.3; cursor:default; }
  .send-icon { font-size:0.9rem; transition:transform 0.3s ease; }
  .btn-send:not(:disabled):active .send-icon { transform:translateX(4px); }
  .toast { position:fixed; bottom:calc(var(--safe-bottom) + 2rem); left:50%; transform:translateX(-50%) translateY(20px); background:var(--surface); border:1px solid var(--border); border-radius:999px; padding:0.6rem 1.2rem; font-size:0.7rem; letter-spacing:0.1em; color:var(--text); opacity:0; transition:all 0.35s cubic-bezier(0.34,1.56,0.64,1); pointer-events:none; white-space:nowrap; z-index:100; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  .toast.success { border-color:rgba(200,255,0,0.3); color:var(--accent); }
  .toast.err { border-color:rgba(255,59,48,0.3); color:var(--red); }
  .spinner { display:inline-block; width:14px; height:14px; border:2px solid rgba(200,255,0,0.3); border-top-color:var(--accent); border-radius:50%; animation:spin 0.7s linear infinite; vertical-align:middle; }
  @keyframes spin { to{transform:rotate(360deg)} }
  @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
  @keyframes flashAccent { 0%,100%{color:var(--accent)} 50%{color:#fff} }
  .flash { animation:flashAccent 0.4s ease; }
  .no-ble { text-align:center; padding:2rem; color:var(--muted); font-size:0.75rem; line-height:1.8; letter-spacing:0.05em; animation:fadeUp 0.6s ease both; }
  .no-ble strong { color:var(--red); display:block; font-size:1rem; margin-bottom:0.5rem; }
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="wrapper" id="app">
  <div class="header">
    <div class="title"><span style="font-family:'Barlow Condensed',sans-serif; font-size:2rem">Lyszyk's </span>ESP<span>32</span>Clock</div>
    <div class="tagline">Bluetooth Low Energy Controller</div>
  </div>
  <div class="status-pill">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Disconnected</span>
  </div>
  <div class="time-card" id="timeCard">
    <div class="scan-line"></div>
    <div class="card-label">Received from device</div>
    <div class="time-display empty" id="timeDisplay">-- -- --</div>
    <div class="time-sub" id="timeSub"></div>
  </div>
  <button class="btn-connect idle" id="btnConnect" onclick="toggleConnect()">Connect to ESP32</button>
  <button class="btn-send" id="btnSend" disabled onclick="sendTime()">
    <span class="send-icon">&#128336;</span> Send Current Time
  </button>
  <div style="display:flex; gap:1rem;">
    <button class="btn-send" id="btnAnim1" disabled onclick="sendCommand('anim1')" style="width:50%;">anim1</button>
    <button class="btn-send" id="btnAnim2" disabled onclick="sendCommand('anim2')" style="width:50%;">anim2</button>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
  const SERVICE_UUID = '12345678-1234-1234-1234-1234567890ab';
  const CHAR_TX_UUID = '12345678-1234-1234-1234-1234567890ac';
  const CHAR_RX_UUID = '12345678-1234-1234-1234-1234567890ad';
  let device=null, server=null, txChar=null, rxChar=null, connected=false;
  const btnConnect=document.getElementById('btnConnect');
  const btnSend=document.getElementById('btnSend');
  const timeDisplay=document.getElementById('timeDisplay');
  const timeSub=document.getElementById('timeSub');
  const timeCard=document.getElementById('timeCard');
  const statusDot=document.getElementById('statusDot');
  const statusText=document.getElementById('statusText');
  const toastEl=document.getElementById('toast');

  if (!navigator.bluetooth) {
    document.getElementById('app').innerHTML='<div class="no-ble"><strong>Web Bluetooth not supported</strong>This app needs Web Bluetooth.<br><br>On iPhone use <strong>Bluefy</strong> or <strong>WebBLE</strong> browser.<br>Safari does not support Web Bluetooth.</div>';
  }

  async function toggleConnect() { connected ? disconnect() : await connect(); }

  async function connect() {
    try {
      setConnecting();
      device = await navigator.bluetooth.requestDevice({ filters:[{name:'ESP32-C3-BLE'}], optionalServices:[SERVICE_UUID] });
      device.addEventListener('gattserverdisconnected', onDisconnected);
      server = await device.gatt.connect();
      const service = await server.getPrimaryService(SERVICE_UUID);
      txChar = await service.getCharacteristic(CHAR_TX_UUID);
      rxChar = await service.getCharacteristic(CHAR_RX_UUID);
      await txChar.startNotifications();
      txChar.addEventListener('characteristicvaluechanged', onNotify);
      setConnected(true);
      showToast('Connected to ESP32-C3', 'success');
    } catch(e) {
      setConnected(false);
      if (e.name !== 'NotFoundError') showToast('Connection failed', 'err');
      console.error(e);
    }
  }

  function disconnect() { if(device&&device.gatt.connected) device.gatt.disconnect(); onDisconnected(); }

  function onDisconnected() { setConnected(false); txChar=null; rxChar=null; showToast('Disconnected','err'); }

  function onNotify(event) {
    const value = new TextDecoder().decode(event.target.value);
    timeDisplay.textContent = value;
    timeDisplay.classList.remove('empty','flash');
    void timeDisplay.offsetWidth;
    timeDisplay.classList.add('flash');
    timeCard.classList.add('has-data');
    timeSub.textContent = 'Updated ' + new Date().toLocaleTimeString();
  }

  async function sendCommand(cmd) {
    if (!rxChar) return;
    try {
      await rxChar.writeValue(new TextEncoder().encode(cmd));
      showToast('Sent: ' + cmd, 'success');
    } catch(e) { showToast('Send failed','err'); console.error(e); }
  }
  
  async function sendTime() {
    if (!rxChar) return;
    try {
      const now = new Date();
      const pad = n => String(n).padStart(2,'0');
      const timeStr = now.getFullYear()+'-'+pad(now.getMonth()+1)+'-'+pad(now.getDate())+' '+pad(now.getHours())+':'+pad(now.getMinutes())+':'+pad(now.getSeconds());
      await rxChar.writeValue(new TextEncoder().encode(timeStr));
      showToast('Sent: '+timeStr, 'success');
    } catch(e) { showToast('Send failed','err'); console.error(e); }
  }

  function setConnecting() {
    btnConnect.className='btn-connect connecting';
    btnConnect.innerHTML='<span class="spinner"></span>&nbsp; Connecting...';
    statusDot.className='status-dot'; statusText.textContent='Connecting...'; btnSend.disabled=btnAnim1.disabled=btnAnim2.disabled=true;
  }

  function setConnected(yes) {
    connected=yes;
    if (yes) {
      btnConnect.className='btn-connect connected'; btnConnect.textContent='Disconnect';
      statusDot.className='status-dot connected'; statusText.textContent=device?.name||'Connected'; btnSend.disabled=btnAnim1.disabled=btnAnim2.disabled=false;
    } else {
      btnConnect.className='btn-connect idle'; btnConnect.textContent='Connect to ESP32';
      statusDot.className='status-dot'; statusText.textContent='Disconnected'; btnSend.disabled=btnAnim1.disabled=btnAnim2.disabled=true;
      timeCard.classList.remove('has-data'); timeDisplay.textContent='-- -- --'; timeDisplay.classList.add('empty'); timeSub.textContent='';
    }
  }

  let toastTimer;
  function showToast(msg,type='') {
    toastEl.textContent=msg; toastEl.className='toast show '+type;
    clearTimeout(toastTimer); toastTimer=setTimeout(()=>toastEl.className='toast',2500);
  }
</script>
</body>
</html>

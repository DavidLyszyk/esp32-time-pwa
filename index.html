<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ESP32-C3 Time Sender</title>
</head>
<body>
  <h1>ESP32-C3 Time Sender</h1>
  <button id="connect">Connect BLE</button>
  <button id="send">Send Current Time</button>

  <script>
    let device;
    let characteristic;

    const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
    const CHAR_UUID    = "beb5483e-36e1-4688-b7f5-ea07361b26a8";

    document.getElementById("connect").addEventListener("click", async () => {
      try {
        device = await navigator.bluetooth.requestDevice({
          filters: [{services: [SERVICE_UUID]}]
        });
        const server = await device.gatt.connect();
        const service = await server.getPrimaryService(SERVICE_UUID);
        characteristic = await service.getCharacteristic(CHAR_UUID);
        alert("Connected!");
      } catch (err) {
        console.error(err);
        alert("Connection failed: " + err);
      }
    });

    document.getElementById("send").addEventListener("click", async () => {
      if (!characteristic) return alert("Not connected");

      const now = new Date();
      const timeStr = now.toISOString();
      const encoder = new TextEncoder();
      await characteristic.writeValue(encoder.encode(timeStr));
      console.log("Sent:", timeStr);
      alert("Time sent: " + timeStr);
    });
  </script>
</body>

</html>
